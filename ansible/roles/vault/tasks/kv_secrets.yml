---
# Todas las tareas de este archivo requieren vault_root_token (set en init_unseal.yml)

# ── Motor KV v2 ───────────────────────────────────────────────
# 400 = ya existe el mount (idempotente)
- name: Habilitar motor KV v2 en 'secret/'
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/sys/mounts/{{ vault_kv_mount }}"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      type: kv
      options:
        version: "2"
    status_code: [200, 204, 400]
  when: vault_root_token is defined
  no_log: true

# ── Política CI/CD ────────────────────────────────────────────
# Solo permite leer secretos bajo secret/data/smartcampus/*
- name: Crear política '{{ vault_policy_name }}'
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/sys/policies/acl/{{ vault_policy_name }}"
    method: PUT
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      policy: |
        path "secret/data/smartcampus/*" {
          capabilities = ["read", "list"]
        }
        path "secret/metadata/smartcampus/*" {
          capabilities = ["list"]
        }
    status_code: [200, 204]
  when: vault_root_token is defined
  no_log: true

# ── Token CI/CD ───────────────────────────────────────────────
# Token de larga duración para GitHub Actions (read-only sobre smartcampus/*)
- name: Crear token CI/CD para GitHub Actions
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/auth/token/create"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      display_name: "{{ vault_token_display_name }}"
      policies:
        - "{{ vault_policy_name }}"
      ttl: "{{ vault_token_ttl }}"
      renewable: true
    status_code: [200]
  register: vault_cicd_token
  when: vault_root_token is defined
  no_log: true

# ── Secretos placeholder: AWS ────────────────────────────────
# Reemplazar con valores reales desde la UI: http://<VAULT_IP>:8200
- name: Escribir secretos placeholder en secret/smartcampus/aws
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/{{ vault_kv_mount }}/data/smartcampus/aws"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      data:
        AWS_ACCESS_KEY_ID: "PLACEHOLDER_REPLACE_IN_VAULT_UI"
        AWS_SECRET_ACCESS_KEY: "PLACEHOLDER_REPLACE_IN_VAULT_UI"
    status_code: [200]
  when: vault_root_token is defined
  no_log: true

# ── Secretos placeholder: App ─────────────────────────────────
- name: Escribir secretos de app en secret/smartcampus/app
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/{{ vault_kv_mount }}/data/smartcampus/app"
    method: POST
    headers:
      X-Vault-Token: "{{ vault_root_token }}"
    body_format: json
    body:
      data:
        ENVIRONMENT: "production"
        APP_VERSION: "latest"
    status_code: [200]
  when: vault_root_token is defined
  no_log: true

# ── Resumen final ─────────────────────────────────────────────
- name: Mostrar información de Vault (guardar estos valores)
  ansible.builtin.debug:
    msg:
      - "╔══════════════════════════════════════════════════╗"
      - "║         VAULT PROVISIONADO EXITOSAMENTE          ║"
      - "╚══════════════════════════════════════════════════╝"
      - ""
      - "► VAULT_ADDR  = http://{{ ansible_host }}:{{ vault_port }}"
      - "► VAULT_TOKEN = {{ vault_cicd_token.json.auth.client_token }}"
      - ""
      - "Pasos siguientes:"
      - "  1. Añadir VAULT_ADDR y VAULT_TOKEN a GitHub Secrets"
      - "  2. Abrir http://{{ ansible_host }}:{{ vault_port }}/ui"
      - "     Login con root token de .vault-init.json"
      - "  3. Actualizar secretos reales en:"
      - "     secret/smartcampus/aws → AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY"
      - "  4. Eliminar AWS_ACCESS_KEY_ID y AWS_SECRET_ACCESS_KEY de GitHub Secrets"
  when:
    - vault_root_token is defined
    - vault_cicd_token is defined
    - not vault_cicd_token.failed | default(false)
