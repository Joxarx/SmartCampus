---
# ── Esperar a que la API de Vault esté disponible ─────────────
# El health endpoint devuelve 501 cuando no está inicializado (normal)
- name: Esperar a que la API de Vault responda
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ vault_port }}/v1/sys/health"
    status_code: [200, 429, 472, 473, 501, 503]
  register: vault_health
  until: vault_health.status in [200, 429, 472, 473, 501, 503]
  retries: 12
  delay: 5

# ── Verificar si ya está inicializado ────────────────────────
# rc=0 → inicializado | rc=1 → NO inicializado | rc=2 → error
- name: Verificar estado de inicialización de Vault
  ansible.builtin.command:
    cmd: vault operator init -status
  environment:
    VAULT_ADDR: "http://127.0.0.1:{{ vault_port }}"
  register: vault_init_status
  failed_when: vault_init_status.rc not in [0, 1, 2]
  changed_when: false

# ── Inicializar (solo si no lo está) ─────────────────────────
- name: Inicializar Vault (solo primera vez)
  ansible.builtin.command:
    cmd: vault operator init -key-shares=1 -key-threshold=1 -format=json
  environment:
    VAULT_ADDR: "http://127.0.0.1:{{ vault_port }}"
  register: vault_init_output
  when: vault_init_status.rc == 1
  no_log: true

# ── Guardar claves localmente ─────────────────────────────────
# .vault-init.json contiene unseal key y root token — proteger
- name: Guardar init output en .vault-init.json (local)
  ansible.builtin.copy:
    content: "{{ vault_init_output.stdout }}"
    dest: ".vault-init.json"
    mode: "0600"
  delegate_to: localhost
  when: vault_init_output is not skipped
  no_log: true

# ── Parsear claves de init reciente ──────────────────────────
- name: Extraer unseal key y root token del init
  ansible.builtin.set_fact:
    vault_unseal_key: "{{ (vault_init_output.stdout | from_json).unseal_keys_b64[0] }}"
    vault_root_token: "{{ (vault_init_output.stdout | from_json).root_token }}"
  when: vault_init_output is not skipped
  no_log: true

# ── Re-run: leer .vault-init.json existente ──────────────────
- name: Leer .vault-init.json local (re-ejecución)
  ansible.builtin.slurp:
    src: ".vault-init.json"
  delegate_to: localhost
  register: vault_init_file
  when: vault_init_status.rc == 0
  ignore_errors: true
  no_log: true

- name: Parsear .vault-init.json existente
  ansible.builtin.set_fact:
    vault_unseal_key: "{{ (vault_init_file.content | b64decode | from_json).unseal_keys_b64[0] }}"
    vault_root_token: "{{ (vault_init_file.content | b64decode | from_json).root_token }}"
  when:
    - vault_init_status.rc == 0
    - vault_init_file is not skipped
    - not vault_init_file.failed | default(false)
  no_log: true

# ── Unseal ───────────────────────────────────────────────────
- name: Unseal Vault
  ansible.builtin.command:
    cmd: "vault operator unseal {{ vault_unseal_key }}"
  environment:
    VAULT_ADDR: "http://127.0.0.1:{{ vault_port }}"
  when: vault_unseal_key is defined
  no_log: true
  changed_when: true
