[vault_servers]
# Rellena VAULT_IP con el output de: terraform output vault_public_ip
# Rellena el path de tu clave SSH con el vault_key_name configurado en Terraform
#
# Ejemplo:
#   vault_server ansible_host=1.2.3.4 ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/mi-clave.pem
vault_server ansible_host=VAULT_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/mi-clave.pem
