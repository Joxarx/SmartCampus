# ============================================================
# cd.yml - Pipeline de Entrega Continua (CD)
# SmartCampus Services - GitHub Actions
# Disparador: merge/push a la rama main (producción)
# Despliegue: AWS SSM → EC2 t2.micro → Docker (Free Tier)
# ============================================================

name: 🚀 CD - Deploy a EC2 con Docker

on:
  push:
    branches:
      - main  # Solo despliega cuando hay merge a main

  pull_request:
    branches:
      - main  # También en PRs dirigidos a main (para validar)
    types: [closed]  # Solo cuando el PR está cerrado (merged)

  workflow_dispatch:  # Permite despliegue manual de emergencia

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: smartcampus-services
  # Silencia warnings de deprecation de Node.js 20 en GitHub Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Evita despliegues duplicados (push + pull_request closed)
# y corridas paralelas en producción.
concurrency:
  group: deploy-prod-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── JOB ÚNICO: Despliegue en EC2 via SSM ─────────────────
  # SSM Session Manager permite enviar comandos a la instancia EC2
  # sin abrir el puerto 22 (SSH). Más seguro y sin gestión de claves.
  deploy:
    name: 🚀 Deploy a EC2 con Docker
    runs-on: ubuntu-latest
    environment: production  # Requiere aprobación manual en GitHub
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true) || github.event_name == 'workflow_dispatch'

    # Vault es opcional: si VAULT_ADDR está configurado se usa,
    # si no, caemos a AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY de GitHub Secrets.
    env:
      VAULT_ADDR: ${{ secrets.VAULT_ADDR }}

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # Solo corre si VAULT_ADDR está definido en GitHub Secrets
      - name: 🔓 Leer secretos desde Vault
        if: env.VAULT_ADDR != ''
        uses: hashicorp/vault-action@v3
        id: vault-secrets
        with:
          url: ${{ env.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/smartcampus/aws AWS_ACCESS_KEY_ID | AWS_ACCESS_KEY_ID
            secret/data/smartcampus/aws AWS_SECRET_ACCESS_KEY | AWS_SECRET_ACCESS_KEY

      - name: 🔐 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # Si Vault está disponible usa sus outputs; si no, usa secrets directos
          aws-access-key-id: ${{ steps.vault-secrets.outputs.AWS_ACCESS_KEY_ID || secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ steps.vault-secrets.outputs.AWS_SECRET_ACCESS_KEY || secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🔑 Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Obtiene el tag de la imagen (SHA del commit, 7 caracteres)
      - name: 🏷️ Obtener tag de imagen
        id: image-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}"
          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT

      # Busca el ID de la instancia EC2 por tag de proyecto
      - name: 🔍 Obtener ID de instancia EC2
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=SmartCampus" \
              "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" == "None" ]; then
            echo "❌ No se encontró instancia EC2 con tag Project=SmartCampus en estado running"
            exit 1
          fi

          echo "instance-id=${INSTANCE_ID}" >> $GITHUB_OUTPUT
          echo "✅ Instancia EC2 encontrada: ${INSTANCE_ID}"

      # Envía comandos a la instancia via SSM (sin SSH ni puerto 22)
      # Detiene el contenedor anterior y arranca uno nuevo con la imagen actualizada
      # Usamos --cli-input-json con un archivo para evitar problemas de escaping
      - name: 📦 Deploy - actualizar contenedor Docker en EC2
        id: deploy
        env:
          IMAGE_URI: ${{ steps.image-tag.outputs.image-uri }}
          ECR_REGISTRY: ${{ steps.image-tag.outputs.registry }}
          INSTANCE_ID: ${{ steps.ec2.outputs.instance-id }}
          IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
        run: |
          set -euo pipefail

          # Construimos el JSON de parametros con jq para escapar correctamente
          PARAMS_JSON=$(jq -n \
            --arg region "$AWS_REGION" \
            --arg registry "$ECR_REGISTRY" \
            --arg image "$IMAGE_URI" \
            --arg tag "$IMAGE_TAG" \
            '{
              commands: [
                ("aws ecr get-login-password --region " + $region + " | docker login --username AWS --password-stdin " + $registry),
                ("docker pull " + $image),
                "docker stop smartcampus || true",
                "docker rm smartcampus || true",
                ("docker run -d --name smartcampus --restart unless-stopped -p 8000:8000 -e ENVIRONMENT=production -e APP_VERSION=" + $tag + " " + $image),
                "docker ps --filter name=smartcampus"
              ]
            }')

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS_JSON" \
            --query 'Command.CommandId' \
            --output text)

          echo "✅ Comando SSM enviado: ${COMMAND_ID}"
          echo "command-id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

          # Esperar a que el comando termine (sin enmascarar fallos)
          if ! aws ssm wait command-executed \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID"; then
            echo "❌ El comando SSM no completó exitosamente"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --output text || true
            exit 1
          fi

          # Mostrar el resultado del comando
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          echo "📋 Status SSM: $STATUS"
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[StandardOutputContent, StandardErrorContent]' \
            --output text

          if [ "$STATUS" != "Success" ]; then
            echo "❌ Deploy SSM terminó con status: $STATUS"
            exit 1
          fi

      # Verifica que la aplicación responde correctamente
      - name: 🔍 Verificar que la app responde
        id: verify
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance-id }}
        run: |
          set -euo pipefail

          # Obtener IP pública de la instancia
          PUBLIC_IP=$(aws ec2 describe-instances \
            --instance-ids "$INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)

          if [ -z "$PUBLIC_IP" ] || [ "$PUBLIC_IP" == "None" ]; then
            echo "❌ No se pudo obtener IP pública de la instancia"
            exit 1
          fi

          echo "🌐 App URL: http://${PUBLIC_IP}:8000"
          echo "public-ip=${PUBLIC_IP}" >> "$GITHUB_OUTPUT"

          # Esperar hasta 60 segundos para que el contenedor esté listo
          SUCCESS=false
          for i in {1..12}; do
            if curl -sf --max-time 5 "http://${PUBLIC_IP}:8000/health" > /dev/null 2>&1; then
              echo "✅ La aplicación responde correctamente"
              curl -s --max-time 5 "http://${PUBLIC_IP}:8000/health"
              SUCCESS=true
              break
            fi
            echo "⏳ Intento ${i}/12 - esperando que la app esté lista..."
            sleep 5
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ La aplicación no respondió tras 60s en http://${PUBLIC_IP}:8000/health"
            exit 1
          fi

      - name: 📝 Resumen del despliegue
        if: always()
        run: |
          {
            echo "## 🚀 Deployment Summary"
            echo "| Campo | Valor |"
            echo "|-------|-------|"
            echo "| **Instancia EC2** | \`${{ steps.ec2.outputs.instance-id }}\` |"
            echo "| **Image URI** | \`${{ steps.image-tag.outputs.image-uri }}\` |"
            echo "| **Image Tag** | \`${{ steps.image-tag.outputs.tag }}\` |"
            echo "| **App URL** | http://${{ steps.verify.outputs.public-ip }}:8000 |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
