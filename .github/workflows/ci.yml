# ============================================================
# ci.yml - Pipeline de Integración Continua (CI)
# SmartCampus Services - GitHub Actions
# Disparador: push a cualquier rama
# ============================================================

name: 🔨 CI - Build & Push Docker Image

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "app/**"           # Solo corre si cambia código de la app
      - ".github/workflows/ci.yml"

  # Permite lanzarlo manualmente desde la UI de GitHub
  workflow_dispatch:

# Variables de entorno globales del pipeline
env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: smartcampus-services
  IMAGE_NAME: smartcampus-app

jobs:
  # ── JOB 1: Tests y Linting ──────────────────────────────
  test:
    name: 🧪 Pruebas y Calidad de Código
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # Cachea dependencias para builds más rápidas

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-cov httpx flake8

      - name: 🔍 Linting con Flake8 (calidad de código)
        run: |
          # Verifica estilo PEP8 - líneas max 120 caracteres
          flake8 app/main.py --max-line-length=120

      - name: ✅ Ejecutar pruebas unitarias
        run: |
          cd app
          python -m pytest tests/ --tb=short -v --cov=main --cov-report=term-missing

  # ── JOB 1.5: Validación de Terraform ────────────────────
  terraform-validate:
    name: 🔍 Validar Terraform
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🔧 Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.0

      - name: ✅ Validar sintaxis de Terraform
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate
          terraform fmt -check

  # ── JOB 2: Build y Push a ECR ───────────────────────────
  build-and-push:
    name: 🐳 Build & Push a Amazon ECR
    runs-on: ubuntu-latest
    needs: test  # Solo se ejecuta si los tests pasan
    
    outputs:
      # Exporta la URL de la imagen para usarla en el pipeline CD
      image-uri: ${{ steps.build-image.outputs.image-uri }}
      image-tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      # Genera metadatos de la imagen (tags, labels estándar OCI)
      - name: 🏷️ Generar tags de la imagen
        id: meta
        run: |
          # Tag con el SHA del commit para trazabilidad total
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image tag: ${SHORT_SHA}"

      - name: 🔓 Leer secretos desde Vault
        uses: hashicorp/vault-action@v3
        id: vault-secrets
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/smartcampus/aws AWS_ACCESS_KEY_ID | AWS_ACCESS_KEY_ID
            secret/data/smartcampus/aws AWS_SECRET_ACCESS_KEY | AWS_SECRET_ACCESS_KEY

      - name: 🔐 Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ steps.vault-secrets.outputs.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ steps.vault-secrets.outputs.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Autentica Docker contra ECR para poder hacer push
      - name: 🔑 Login a Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Construye la imagen Docker usando buildx (soporta multi-arch)
      - name: 🔨 Build de la imagen Docker
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          
          # Build con BuildKit habilitado para mayor velocidad
          DOCKER_BUILDKIT=1 docker build \
            --build-arg APP_VERSION="${IMAGE_TAG}" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --tag "${IMAGE_URI}" \
            --tag "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest" \
            ./app

          echo "image-uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "✅ Imagen construida: ${IMAGE_URI}"

      # Escanea la imagen en busca de vulnerabilidades CVE
      - name: 🛡️ Escaneo de seguridad con Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build-image.outputs.image-uri }}
          format: table
          exit-code: "0"  # No falla el pipeline, solo reporta
          severity: CRITICAL,HIGH

      # Sube la imagen al registro de AWS (ECR)
      - name: 📤 Push de imagen a ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker push "${{ steps.build-image.outputs.image-uri }}"
          docker push "${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"
          echo "✅ Imagen publicada exitosamente en ECR"

      # Guarda la URI de la imagen en el summary de GitHub Actions
      - name: 📝 Resumen del build
        run: |
          echo "## 🐳 Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagen** | \`${{ steps.build-image.outputs.image-uri }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ steps.meta.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Rama** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
