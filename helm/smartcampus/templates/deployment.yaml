# ============================================================
# templates/deployment.yaml - Manifiesto del Deployment K8s
# Un Deployment gestiona el ciclo de vida de los pods de la app
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-app
  namespace: {{ .Release.Namespace }}
  labels:
    # Labels estándar de Helm para identificar recursos
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    # Registra el timestamp del último despliegue
    deployment.kubernetes.io/deployed-at: {{ now | quote }}

spec:
  # Número de réplicas del pod (definido en values.yaml)
  replicas: {{ .Values.replicaCount }}

  # Selector: cómo el Deployment encuentra sus pods
  selector:
    matchLabels:
      app: {{ .Release.Name }}
      component: api

  # Estrategia de actualización sin downtime
  strategy:
    type: {{ .Values.strategy.type }}
    rollingUpdate:
      maxSurge: {{ .Values.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.strategy.rollingUpdate.maxUnavailable }}

  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        component: api
        version: {{ .Values.image.tag | quote }}
      annotations:
        # Fuerza re-deploy si cambia el configmap (buena práctica)
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}

    spec:
      # Garantiza que los pods se distribuyan en distintos nodos
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: {{ .Release.Name }}

      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # Variables de entorno de la aplicación
          env:
            - name: APP_VERSION
              value: {{ .Values.env.APP_VERSION | quote }}
            - name: ENVIRONMENT
              value: {{ .Values.env.ENVIRONMENT | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name  # Inyecta el nombre del pod

          # Sonda de vivacidad: reinicia el pod si la app no responde
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.httpGet.path }}
              port: {{ .Values.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}

          # Sonda de preparación: el pod recibe tráfico solo si está listo
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.httpGet.path }}
              port: {{ .Values.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}

          # Límites de recursos (definidos en values.yaml)
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}

      # Los pods se reiniciarán siempre si fallan
      restartPolicy: Always
